<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitsySAH - Web Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-banner {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('SAHbanner.jpg');
            background-size: cover; background-position: center;
        }
        .bitsy-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #facc15; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

    <section class="hero-banner py-12 text-center border-b border-gray-800">
        <h1 class="text-4xl font-bold uppercase italic">AI For <span class="text-yellow-400">Market Intelligence</span></h1>
        <p class="text-gray-400 mt-2">Powered by Sahara AI Infrastructure</p>
    </section>

    <main class="flex-grow p-6 max-w-2xl mx-auto w-full" id="chat-box">
        <div class="flex gap-4 items-start mb-6">
            <img src="Bitsy.png" class="bitsy-avatar" alt="Bitsy">
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                Hi! I'm your Bitsy Agent. Let's communicate!
            </div>
        </div>
    </main>

    <footer class="p-6 bg-black border-t border-gray-900">
        <div class="max-w-2xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="Type a message..." class="flex-grow bg-gray-900 rounded-xl px-4 py-3 outline-none border border-gray-800">
            <button onclick="sendMessage()" class="bg-yellow-400 text-black px-6 py-3 rounded-xl font-bold">Send</button>
        </div>
    </footer>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            // User message
            chatBox.innerHTML += `<div class="text-right mb-6"><span class="bg-yellow-400 text-black p-4 rounded-2xl inline-block">${input.value}</span></div>`;
            
            // Bitsy response
            setTimeout(() => {
                chatBox.innerHTML += `
                    <div class="flex gap-4 items-start mb-6">
                        <img src="Bitsy.png" class="bitsy-avatar">
                        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">Processing your request on Sahara AI...</div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
            input.value = '';
        }
    </script>
</body>
</html>
