<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitsySAH - Sahara AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .chat-bubble { border-radius: 18px; max-width: 85%; }
        .bg-bitsy { background-color: #111; border: 1px solid #222; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-4 border-b border-gray-800 flex items-center justify-between sticky top-0 bg-black/90 backdrop-blur-sm z-50">
        <div class="flex items-center gap-3">
            <img src="Bitsy.png" class="w-10 h-10 rounded-full border border-yellow-500">
            <div>
                <h1 class="font-bold text-lg text-white">Bitsy<span class="text-yellow-500">SAH</span></h1>
                <p class="text-[10px] text-green-500 uppercase tracking-widest font-mono">● System Online</p>
            </div>
        </div>
        <div class="text-[10px] text-gray-500 font-mono hidden md:block">MODEL: GEMINI-1.5-FLASH</div>
    </header>

    <main id="chat-box" class="chat-container p-4 space-y-6 flex-grow">
        <div class="flex gap-3">
            <img src="Bitsy.png" class="w-8 h-8 rounded-full flex-shrink-0">
            <div class="bg-bitsy p-4 chat-bubble text-sm">
                <p class="text-yellow-500 font-bold text-[10px] uppercase mb-1">Bitsy</p>
                Bitsy is online. How can I assist you with Sahara AI today?
            </div>
        </div>
    </main>

    <footer class="p-4 bg-black border-t border-gray-900 sticky bottom-0">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Type your message..." 
                class="flex-grow bg-[#111] border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-500 transition-all text-white">
            <button id="send-btn" class="bg-yellow-400 text-black px-6 py-3 rounded-xl font-bold text-sm hover:bg-yellow-300 active:scale-95 transition-all">
                SEND
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // 1. Append User Message
            chatBox.innerHTML += `
                <div class="flex gap-3 flex-row-reverse">
                    <div class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-bold text-[10px] flex-shrink-0">YOU</div>
                    <div class="bg-yellow-400 text-black p-4 chat-bubble text-sm font-medium">
                        ${text}
                    </div>
                </div>`;
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Append Thinking Indicator
            const thinkingId = "bitsy-" + Date.now();
            chatBox.innerHTML += `
                <div class="flex gap-3" id="${thinkingId}">
                    <img src="Bitsy.png" class="w-8 h-8 rounded-full flex-shrink-0">
                    <div class="bg-bitsy p-4 chat-bubble text-sm text-gray-400 italic">
                        Bitsy is thinking...
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Call API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await response.json();

                // 4. Update UI with Response
                const responseDiv = document.getElementById(thinkingId).querySelector('.chat-bubble');
                responseDiv.classList.remove('italic', 'text-gray-400');
                responseDiv.innerHTML = `
                    <p class="text-yellow-500 font-bold text-[10px] uppercase mb-1">Bitsy</p>
                    ${data.reply || data.error}
                `;
            } catch (error) {
                const responseDiv = document.getElementById(thinkingId).querySelector('.chat-bubble');
                responseDiv.innerHTML = `<p class="text-red-500 text-xs">Error: Connection lost.</p>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
