<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitsySAH - Sahara AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bitsy-bg { background-color: #000000; }
        .bitsy-yellow-text { color: #facc15; }
        .chat-bubble { border-radius: 20px; }
        
        .bitsy-avatar-container {
            width: 3.5rem; height: 3.5rem;
            border-radius: 9999px;
            background-color: #facc15;
            overflow: hidden;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bitsy-avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Linked to SAHbanner.jpg from your GitHub */
        .hero-banner {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('SAHbanner.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #1a1a1a;
        }
    </style>
</head>
<body class="bitsy-bg text-white font-sans min-h-screen flex flex-col">

    <header class="p-4 border-b border-gray-900 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border border-yellow-500/50 overflow-hidden">
                <img src="Bitsy.png" alt="Bitsy" class="w-full h-full object-cover">
            </div>
            <h1 class="text-xl font-bold tracking-tight">BitsySAH</h1>
        </div>
    </header>

    <section class="hero-banner w-full py-16 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-3xl md:text-5xl font-black mb-4 uppercase italic">
                AI For <span class="bitsy-yellow-text">Market Intelligence</span>
            </h2>
            <p class="text-gray-400 font-light">Decentralized AI Infrastructure by Sahara AI</p>
        </div>
    </section>

    <main class="flex-grow p-4 md:p-8 max-w-4xl mx-auto w-full" id="chat-box">
        <div class="flex gap-4 mb-8">
            <div class="bitsy-avatar-container flex-shrink-0">
                <img src="Bitsy.png" alt="Bitsy" class="bitsy-avatar-img">
            </div>
            <div class="bg-[#111] p-5 chat-bubble max-w-[85%] text-sm border border-gray-800">
                Hi! I am Bitsy 🦊. Welcome to my Sahara AI interface.
            </div>
        </div>
    </main>

    <footer class="p-4 md:p-6 bg-black border-t border-gray-900">
        <div class="max-w-4xl mx-auto flex gap-3 bg-[#111] rounded-2xl p-2 items-center border border-gray-800">
            <input type="text" placeholder="Message Bitsy..." class="bg-transparent flex-grow px-4 py-3 outline-none">
            <button class="bg-yellow-400 text-black px-6 py-3 rounded-xl font-black uppercase text-[10px]">Send</button>
        </div>
    </footer>
</body>
</html>
